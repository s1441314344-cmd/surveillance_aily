<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智能巡检系统</title>
    <!-- 飞书 JS-SDK -->
    <script src="https://lf1-cdn-tos.bytegoofy.com/goofy/lark/op/h5-js-sdk-1.5.28.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding-top: 20px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 20px 10px;
            text-align: center;
            color: white;
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-select, .form-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            background: white;
        }

        .form-select:focus, .form-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .radio-item input[type="radio"] {
            margin-right: 5px;
        }

        .upload-area {
            border: 3px dashed #ccc;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #fafafa;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .upload-text {
            color: #666;
            font-size: 14px;
        }

        .upload-hint {
            color: #999;
            font-size: 12px;
            margin-top: 8px;
        }

        #fileInput {
            display: none;
        }

        .image-preview {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: #f0f0f0;
        }

        .image-preview img {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
        }

        .image-change {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }

        .camera-list {
            display: grid;
            gap: 15px;
        }

        .camera-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .camera-item:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .camera-item.active {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .camera-icon {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 15px;
        }

        .camera-info {
            flex: 1;
        }

        .camera-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 3px;
        }

        .camera-type {
            font-size: 12px;
            color: #999;
        }

        .result-panel {
            display: none;
            background: #d4edda;
            border: 1px solid #c3e6cb;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }

        .result-panel.show {
            display: block;
        }

        .result-title {
            color: #155724;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #c3e6cb;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .log-panel {
            background: #1e1e1e;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }

        .log-title {
            color: #fff;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .log-content {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            line-height: 1.5;
            color: #d4d4d4;
        }

        .log-entry {
            margin-bottom: 5px;
            padding-left: 10px;
            border-left: 2px solid #666;
        }

        .log-entry.success {
            border-left-color: #2ecc71;
            color: #2ecc71;
        }

        .log-entry.error {
            border-left-color: #e74c3c;
            color: #e74c3c;
        }

        @media (max-width: 600px) {
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .stat-number {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 智能巡检系统</h1>
            <p>飞书网页应用版 - 拍照上传与AI检测</p>
        </div>

        <!-- 统计卡片 -->
        <div class="card">
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-number" id="statCameras">0</div>
                    <div class="stat-label">巡检点位</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="statUploads">0</div>
                    <div class="stat-label">今日上传</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="statPending">0</div>
                    <div class="stat-label">待处理</div>
                </div>
            </div>
        </div>

        <!-- 巡检点位选择 -->
        <div class="card">
            <div class="card-title">📷 选择巡检点位</div>
            <div class="camera-list" id="cameraList">
                <div style="text-align: center; color: #999; padding: 20px;">加载中...</div>
            </div>
        </div>

        <!-- 上传配置 -->
        <div class="card">
            <div class="card-title">⚙️ 检测配置</div>
            
            <div class="form-group">
                <label class="form-label">检测类型</label>
                <div class="radio-group">
                    <label class="radio-item">
                        <input type="radio" name="detectType" value="person" checked>
                        <span>人员检测</span>
                    </label>
                    <label class="radio-item">
                        <input type="radio" name="detectType" value="vehicle">
                        <span>车辆检测</span>
                    </label>
                    <label class="radio-item">
                        <input type="radio" name="detectType" value="all">
                        <span>全部检测</span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">上传模式</label>
                <div class="radio-group">
                    <label class="radio-item">
                        <input type="radio" name="uploadMode" value="aily" checked>
                        <span>Aily技能触发</span>
                    </label>
                    <label class="radio-item">
                        <input type="radio" name="uploadMode" value="bitable">
                        <span>多维表格存储</span>
                    </label>
                </div>
            </div>
        </div>

        <!-- 图片上传 -->
        <div class="card">
            <div class="card-title">📤 上传照片</div>
            
            <div class="form-group">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📷</div>
                    <div class="upload-text">点击拍照或选择照片</div>
                    <div class="upload-hint">支持 JPG、PNG 格式</div>
                </div>
                <input type="file" id="fileInput" accept="image/*" capture="environment">
            </div>

            <div class="image-preview" id="imagePreview" style="display: none;">
                <img id="previewImg" src="" alt="预览">
                <div class="image-change" id="changeImage">更换图片</div>
            </div>

            <button class="btn btn-primary" id="btnUpload" disabled>
                开始上传检测
            </button>

            <div class="result-panel" id="resultPanel">
                <div class="result-title">✓ 上传成功</div>
                <div id="resultContent"></div>
            </div>
        </div>

        <!-- 日志 -->
        <div class="card" id="logCard" style="display: none;">
            <div class="card-title">📝 操作日志</div>
            <div class="log-panel">
                <div class="log-content" id="logContent"></div>
            </div>
        </div>
    </div>

    <script>
        // 配置
        const CONFIG = {
            API_BASE_URL: window.location.hostname === 'localhost' 
                ? 'http://localhost:5002/api' 
                : 'https://your-server-domain.com/api',
            FEISHU_APP_ID: 'cli_a938218fc6f9dbcb' // 替换为你的App ID
        };

        // 全局状态
        let selectedCamera = null;
        let selectedFile = null;
        let cameras = [];

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initFeishuSDK();
            loadCameras();
            bindEvents();
        });

        // 初始化飞书SDK
        function initFeishuSDK() {
            if (typeof h5 !== 'undefined') {
                h5.ready(() => {
                    addLog('飞书SDK已就绪', 'success');
                    
                    // 获取用户信息
                    h5.getUserInfo({
                        success: (res) => {
                            addLog(`当前用户: ${res.userInfo.name}`, 'success');
                        },
                        fail: (err) => {
                            addLog('获取用户信息失败: ' + JSON.stringify(err), 'error');
                        }
                    });
                });
            } else {
                addLog('非飞书环境，使用标准浏览器模式', 'success');
            }
        }

        // 加载巡检点位
        async function loadCameras() {
            try {
                addLog('正在加载巡检点位...');
                
                const response = await fetch(`${CONFIG.API_BASE_URL}/cameras`);
                const result = await response.json();

                if (result.success) {
                    cameras = result.data;
                    renderCameraList();
                    updateStats();
                    addLog(`已加载 ${cameras.length} 个巡检点位`, 'success');
                } else {
                    throw new Error(result.error || '加载失败');
                }
            } catch (error) {
                addLog('加载巡检点位失败: ' + error.message, 'error');
                // 使用默认数据
                cameras = [
                    { id: 'cam_001', name: '🏭 生产车间入口', type: 'interval' },
                    { id: 'cam_002', name: '🚗 停车场区域', type: 'interval' },
                    { id: 'cam_003', name: '📦 仓库区域', type: 'interval' },
                ];
                renderCameraList();
            }
        }

        // 渲染巡检点位列表
        function renderCameraList() {
            const container = document.getElementById('cameraList');
            
            if (cameras.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">暂无巡检点位</div>';
                return;
            }

            container.innerHTML = cameras.map(cam => `
                <div class="camera-item" data-id="${cam.id}" onclick="selectCamera('${cam.id}')">
                    <div class="camera-icon">${getCameraIcon(cam.id)}</div>
                    <div class="camera-info">
                        <div class="camera-name">${cam.name}</div>
                        <div class="camera-type">${cam.type === 'keyframe' ? '关键帧检测' : '定时截图'}</div>
                    </div>
                </div>
            `).join('');
        }

        // 获取摄像头图标
        function getCameraIcon(cameraId) {
            const icons = {
                'cam_001': '🏭',
                'cam_002': '🚗',
                'cam_003': '📦',
                'cam_004': '🚪',
                'cam_005': '⚠️'
            };
            return icons[cameraId] || '📷';
        }

        // 选择巡检点位
        function selectCamera(cameraId) {
            selectedCamera = cameraId;
            
            // 更新UI
            document.querySelectorAll('.camera-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.id === cameraId) {
                    item.classList.add('active');
                }
            });

            const camera = cameras.find(c => c.id === cameraId);
            addLog(`已选择巡检点位: ${camera ? camera.name : cameraId}`, 'success');
            
            checkCanUpload();
        }

        // 绑定事件
        function bindEvents() {
            // 文件上传区域点击
            document.getElementById('uploadArea').addEventListener('click', () => {
                document.getElementById('fileInput').click();
            });

            // 文件选择
            document.getElementById('fileInput').addEventListener('change', handleFileSelect);

            // 更换图片
            document.getElementById('changeImage').addEventListener('click', (e) => {
                e.stopPropagation();
                document.getElementById('fileInput').click();
            });

            // 上传按钮
            document.getElementById('btnUpload').addEventListener('click', uploadImage);

            // 拖拽上传
            const uploadArea = document.getElementById('uploadArea');
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.style.borderColor = '#667eea';
                uploadArea.style.background = '#f0f4ff';
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.style.borderColor = '#ccc';
                uploadArea.style.background = '#fafafa';
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.style.borderColor = '#ccc';
                uploadArea.style.background = '#fafafa';
                
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleFile(files[0]);
                }
            });
        }

        // 处理文件选择
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) {
                handleFile(file);
            }
        }

        // 处理文件
        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('请选择图片文件');
                return;
            }

            selectedFile = file;
            addLog(`已选择文件: ${file.name}`);

            // 预览图片
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('previewImg').src = e.target.result;
                document.getElementById('uploadArea').style.display = 'none';
                document.getElementById('imagePreview').style.display = 'block';
            };
            reader.readAsDataURL(file);

            checkCanUpload();
        }

        // 检查是否可以上传
        function checkCanUpload() {
            const btn = document.getElementById('btnUpload');
            btn.disabled = !selectedCamera || !selectedFile;
        }

        // 上传图片
        async function uploadImage() {
            if (!selectedCamera || !selectedFile) {
                alert('请先选择巡检点位和图片');
                return;
            }

            const btn = document.getElementById('btnUpload');
            const camera = cameras.find(c => c.id === selectedCamera);
            const detectType = document.querySelector('input[name="detectType"]:checked').value;
            const uploadMode = document.querySelector('input[name="uploadMode"]:checked').value;

            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> 上传中...';

            addLog('开始上传...');
            addLog(`巡检点位: ${camera ? camera.name : selectedCamera}`);
            addLog(`检测类型: ${detectType}`);
            addLog(`上传模式: ${uploadMode}`);

            try {
                const formData = new FormData();
                formData.append('camera_id', selectedCamera);
                formData.append('detect_type', detectType);
                formData.append('upload_mode', uploadMode);
                formData.append('image', selectedFile);

                const response = await fetch(`${CONFIG.API_BASE_URL}/upload`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    addLog('上传成功', 'success');
                    addLog(`检测到 ${result.data.detection_count} 个目标`, 'success');
                    
                    if (result.data.upload_result.success) {
                        addLog('飞书上传成功', 'success');
                        showResult(result.data);
                    } else {
                        addLog(`飞书上传失败: ${result.data.upload_result.error}`, 'error');
                    }
                } else {
                    throw new Error(result.error || '上传失败');
                }
            } catch (error) {
                addLog(`上传失败: ${error.message}`, 'error');
                alert('上传失败: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '开始上传检测';
            }
        }

        // 显示结果
        function showResult(data) {
            const panel = document.getElementById('resultPanel');
            const content = document.getElementById('resultContent');

            content.innerHTML = `
                <div class="result-item">
                    <span>巡检点位</span>
                    <span>${data.camera_name}</span>
                </div>
                <div class="result-item">
                    <span>检测目标数</span>
                    <span>${data.detection_count} 个</span>
                </div>
                <div class="result-item">
                    <span>上传模式</span>
                    <span>${data.upload_mode === 'aily' ? 'Aily技能' : '多维表格'}</span>
                </div>
                ${data.upload_result.file_id ? `
                <div class="result-item">
                    <span>Aily文件ID</span>
                    <span style="font-size: 12px; color: #667eea;">${data.upload_result.file_id}</span>
                </div>
                ` : ''}
            `;

            panel.classList.add('show');
        }

        // 更新统计数据
        function updateStats() {
            document.getElementById('statCameras').textContent = cameras.length;
            // 这里可以调用API获取真实的统计数据
        }

        // 添加日志
        function addLog(message, type = 'info') {
            const logCard = document.getElementById('logCard');
            const logContent = document.getElementById('logContent');
            
            logCard.style.display = 'block';
            
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${timestamp}] ${message}`;
            
            logContent.appendChild(entry);
            logContent.scrollTop = logContent.scrollHeight;
        }
    </script>
</body>
</html>
