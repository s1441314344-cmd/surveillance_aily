<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智能巡检测试工具</title>
    <script src="https://lf1-cdn-tos.bytegoofy.com/goofy/lark/op/h5-js-sdk-1.5.28.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding-top: 20px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .config-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        @media (max-width: 768px) {
            .config-grid {
                grid-template-columns: 1fr;
            }
        }

        .config-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
        }

        .config-section h3 {
            font-size: 14px;
            color: #667eea;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .config-select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .config-select:focus {
            outline: none;
            border-color: #667eea;
        }

        .config-select:disabled {
            background: #f0f0f0;
            cursor: not-allowed;
        }

        .upload-area {
            border: 3px dashed #ccc;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #fafafa;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .upload-area.dragover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .upload-text {
            color: #666;
            font-size: 14px;
        }

        .upload-hint {
            color: #999;
            font-size: 12px;
            margin-top: 8px;
        }

        #fileInput {
            display: none;
        }

        .image-preview {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: #f0f0f0;
            display: none;
        }

        .image-preview.show {
            display: block;
        }

        .image-preview img {
            width: 100%;
            max-height: 400px;
            object-fit: contain;
        }

        .image-change {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }

        .result-panel {
            display: none;
            background: #d4edda;
            border: 1px solid #c3e6cb;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }

        .result-panel.show {
            display: block;
        }

        .result-title {
            color: #155724;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #c3e6cb;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-item.success {
            color: #155724;
        }

        .result-item.error {
            color: #dc3545;
        }

        .aily-output {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px;
            margin-top: 10px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
        }

        .aily-output-title {
            font-size: 12px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 8px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .log-panel {
            background: #1e1e1e;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            max-height: 250px;
            overflow-y: auto;
        }

        .log-content {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            line-height: 1.5;
            color: #d4d4d4;
        }

        .log-entry {
            margin-bottom: 5px;
            padding-left: 10px;
            border-left: 2px solid #666;
        }

        .log-entry.success {
            border-left-color: #2ecc71;
            color: #2ecc71;
        }

        .log-entry.error {
            border-left-color: #e74c3c;
            color: #e74c3c;
        }

        .log-entry.warning {
            border-left-color: #f39c12;
            color: #f39c12;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        @media (max-width: 600px) {
            .info-grid {
                grid-template-columns: 1fr;
            }
        }

        .info-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
        }

        .info-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧪 智能巡检测试工具</h1>
            <p>多维表格配置选择 | 图片上传模拟 | Aily技能触发</p>
        </div>

        <div class="card">
            <div class="card-title">📋 多维表格配置</div>
            <div class="config-grid">
                <div class="config-section">
                    <h3>📜 巡检规则</h3>
                    <select class="config-select" id="ruleSelect" disabled>
                        <option value="">加载中...</option>
                    </select>
                </div>
                <div class="config-section">
                    <h3>📍 巡检点位</h3>
                    <select class="config-select" id="pointSelect" disabled>
                        <option value="">加载中...</option>
                    </select>
                </div>
                <div class="config-section">
                    <h3>🏢 巡检单位</h3>
                    <select class="config-select" id="unitSelect" disabled>
                        <option value="">加载中...</option>
                    </select>
                </div>
            </div>
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">规则详情</div>
                    <div class="info-value" id="ruleInfo">请选择规则</div>
                </div>
                <div class="info-item">
                    <div class="info-label">点位详情</div>
                    <div class="info-value" id="pointInfo">请选择点位</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📷 图片上传（模拟摄像头）</div>
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📷</div>
                <div class="upload-text">点击选择或拖拽图片到此处</div>
                <div class="upload-hint">支持 JPG、PNG 格式，模拟摄像头获取图片</div>
            </div>
            <input type="file" id="fileInput" accept="image/*">
            
            <div class="image-preview" id="imagePreview">
                <img id="previewImg" src="" alt="预览">
                <div class="image-change" id="changeImage">更换图片</div>
            </div>
        </div>

        <div class="card">
            <button class="btn btn-primary" id="btnDetect" disabled>
                🔍 开始检测并触发Aily技能
            </button>

            <div class="result-panel" id="resultPanel">
                <div class="result-title">✓ 检测完成</div>
                <div id="resultContent"></div>
            </div>
        </div>

        <div class="card" id="logCard" style="display: none;">
            <div class="card-title">📝 操作日志</div>
            <div class="log-panel">
                <div class="log-content" id="logContent"></div>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            API_BASE_URL: window.location.hostname === 'localhost' 
                ? 'http://localhost:5002/api' 
                : 'https://your-server-domain.com/api'
        };

        let rules = [];
        let points = [];
        let units = [];
        let selectedFile = null;

        document.addEventListener('DOMContentLoaded', () => {
            initApp();
        });

        async function initApp() {
            addLog('初始化测试工具...', 'info');
            
            await Promise.all([
                loadRules(),
                loadPoints(),
                loadUnits()
            ]);

            bindEvents();
            addLog('初始化完成', 'success');
        }

        async function loadRules() {
            try {
                addLog('加载巡检规则...');
                const response = await fetch(`${CONFIG.API_BASE_URL}/test/rules`);
                const result = await response.json();

                if (result.success) {
                    rules = result.data;
                    renderSelect('ruleSelect', rules, 'code', 'name');
                    addLog(`已加载 ${rules.length} 条巡检规则`, 'success');
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                addLog('加载巡检规则失败: ' + error.message, 'error');
                document.getElementById('ruleSelect').innerHTML = '<option value="">加载失败</option>';
            }
        }

        async function loadPoints() {
            try {
                addLog('加载巡检点位...');
                const response = await fetch(`${CONFIG.API_BASE_URL}/test/points`);
                const result = await response.json();

                if (result.success) {
                    points = result.data;
                    renderSelect('pointSelect', points, 'code', 'name');
                    addLog(`已加载 ${points.length} 个巡检点位`, 'success');
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                addLog('加载巡检点位失败: ' + error.message, 'error');
                document.getElementById('pointSelect').innerHTML = '<option value="">加载失败</option>';
            }
        }

        async function loadUnits() {
            try {
                addLog('加载巡检单位...');
                const response = await fetch(`${CONFIG.API_BASE_URL}/test/units`);
                const result = await response.json();

                if (result.success) {
                    units = result.data;
                    renderSelect('unitSelect', units, 'code', 'name', true);
                    addLog(`已加载 ${units.length} 个巡检单位`, 'success');
                } else {
                    addLog('巡检单位表未配置或加载失败', 'warning');
                    document.getElementById('unitSelect').innerHTML = '<option value="">未配置</option>';
                }
            } catch (error) {
                addLog('加载巡检单位失败: ' + error.message, 'error');
                document.getElementById('unitSelect').innerHTML = '<option value="">加载失败</option>';
            }
        }

        function renderSelect(selectId, data, valueField, labelField, allowEmpty = false) {
            const select = document.getElementById(selectId);
            select.innerHTML = '';

            if (allowEmpty) {
                const emptyOption = document.createElement('option');
                emptyOption.value = '';
                emptyOption.textContent = '-- 不选择 --';
                select.appendChild(emptyOption);
            }

            if (!data || data.length === 0) {
                const option = document.createElement('option');
                option.value = '';
                option.textContent = '-- 暂无数据 --';
                select.appendChild(option);
                select.disabled = true;
                return;
            }

            data.forEach(item => {
                const option = document.createElement('option');
                option.value = item[valueField];
                option.textContent = item[labelField];
                select.appendChild(option);
            });

            select.disabled = false;
        }

        function bindEvents() {
            document.getElementById('ruleSelect').addEventListener('change', handleRuleChange);
            document.getElementById('pointSelect').addEventListener('change', handlePointChange);
            document.getElementById('unitSelect').addEventListener('change', handleUnitChange);

            document.getElementById('uploadArea').addEventListener('click', () => {
                document.getElementById('fileInput').click();
            });

            document.getElementById('fileInput').addEventListener('change', handleFileSelect);

            document.getElementById('changeImage').addEventListener('click', (e) => {
                e.stopPropagation();
                document.getElementById('fileInput').click();
            });

            const uploadArea = document.getElementById('uploadArea');
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length > 0 && files[0].type.startsWith('image/')) {
                    handleFile(files[0]);
                }
            });

            document.getElementById('btnDetect').addEventListener('click', startDetection);
        }

        function handleRuleChange() {
            const ruleCode = document.getElementById('ruleSelect').value;
            const rule = rules.find(r => r.code === ruleCode);
            
            if (rule) {
                document.getElementById('ruleInfo').textContent = `${rule.name || rule.code} | ${rule.detect_type || '未分类'}`;
                addLog(`已选择规则: ${rule.name || rule.code}`, 'success');
            } else {
                document.getElementById('ruleInfo').textContent = '请选择规则';
            }
            checkCanDetect();
        }

        function handlePointChange() {
            const pointCode = document.getElementById('pointSelect').value;
            const point = points.find(p => p.code === pointCode);
            
            if (point) {
                document.getElementById('pointInfo').textContent = `${point.name || point.code} | ${point.location || '未定位'}`;
                addLog(`已选择点位: ${point.name || point.code}`, 'success');
            } else {
                document.getElementById('pointInfo').textContent = '请选择点位';
            }
            checkCanDetect();
        }

        function handleUnitChange() {
            const unitCode = document.getElementById('unitSelect').value;
            if (unitCode) {
                const unit = units.find(u => u.code === unitCode);
                addLog(`已选择单位: ${unit ? unit.name : unitCode}`, 'success');
            }
            checkCanDetect();
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) {
                handleFile(file);
            }
        }

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('请选择图片文件');
                return;
            }

            selectedFile = file;
            addLog(`已选择文件: ${file.name} (${(file.size / 1024).toFixed(1)}KB)`);

            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('previewImg').src = e.target.result;
                document.getElementById('uploadArea').style.display = 'none';
                document.getElementById('imagePreview').classList.add('show');
            };
            reader.readAsDataURL(file);

            checkCanDetect();
        }

        function checkCanDetect() {
            const rule = document.getElementById('ruleSelect').value;
            const point = document.getElementById('pointSelect').value;
            const btn = document.getElementById('btnDetect');
            btn.disabled = !rule || !point || !selectedFile;
        }

        async function startDetection() {
            const ruleCode = document.getElementById('ruleSelect').value;
            const pointCode = document.getElementById('pointSelect').value;
            const unitCode = document.getElementById('unitSelect').value;
            const btn = document.getElementById('btnDetect');

            if (!selectedFile) {
                alert('请先选择图片');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> 检测中...';
            addLog('开始检测...');

            try {
                const base64 = await fileToBase64(selectedFile);
                
                addLog('上传图片到服务器...');
                
                const response = await fetch(`${CONFIG.API_BASE_URL}/test/detect`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        rule_id: ruleCode,
                        point_id: pointCode,
                        unit_id: unitCode || null,
                        image_base64: base64
                    })
                });

                const result = await response.json();

                if (result.success) {
                    addLog('检测完成', 'success');
                    showResult(result.data);
                    
                    if (result.data.aily_triggered) {
                        addLog('Aily技能已触发', 'success');
                    } else {
                        addLog('Aily技能触发失败', 'error');
                    }
                } else {
                    throw new Error(result.error || '检测失败');
                }
            } catch (error) {
                addLog('检测失败: ' + error.message, 'error');
                alert('检测失败: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🔍 开始检测并触发Aily技能';
                checkCanDetect();
            }
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function showResult(data) {
            const panel = document.getElementById('resultPanel');
            const content = document.getElementById('resultContent');

            let ailyOutput = '';
            if (data.aily_result) {
                ailyOutput = `
                    <div class="aily-output-title">Aily返回结果：</div>
                    <div class="aily-output">${JSON.stringify(data.aily_result, null, 2)}</div>
                `;
            }

            content.innerHTML = `
                <div class="result-item">
                    <span>巡检规则</span>
                    <span>${data.rule_name || data.rule_id}</span>
                </div>
                <div class="result-item">
                    <span>巡检点位</span>
                    <span>${data.point_name || data.point_id}</span>
                </div>
                ${data.unit_name ? `
                <div class="result-item">
                    <span>巡检单位</span>
                    <span>${data.unit_name}</span>
                </div>
                ` : ''}
                <div class="result-item">
                    <span>检测结果</span>
                    <span>检测到 ${data.detection_count} 个目标</span>
                </div>
                <div class="result-item ${data.aily_triggered ? 'success' : 'error'}">
                    <span>Aily技能</span>
                    <span>${data.aily_triggered ? '✓ 已触发' : '✗ 触发失败'}</span>
                </div>
                ${data.file_id ? `
                <div class="result-item">
                    <span>文件ID</span>
                    <span style="font-size: 11px; color: #667eea;">${data.file_id}</span>
                </div>
                ` : ''}
                ${ailyOutput}
            `;

            panel.classList.add('show');
        }

        function addLog(message, type = 'info') {
            const logCard = document.getElementById('logCard');
            const logContent = document.getElementById('logContent');
            
            logCard.style.display = 'block';
            
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${timestamp}] ${message}`;
            
            logContent.appendChild(entry);
            logContent.scrollTop = logContent.scrollHeight;
        }
    </script>
</body>
</html>
