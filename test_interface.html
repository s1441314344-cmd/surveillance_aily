<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能巡检系统 - 测试控制台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .connection-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            margin-top: 15px;
            font-size: 14px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2ecc71;
            animation: pulse 2s infinite;
        }

        .status-dot.error {
            background: #e74c3c;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        /* 左侧控制面板 */
        .control-panel {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            height: fit-content;
        }

        .panel-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            background: white;
        }

        .form-select:focus {
            outline: none;
            border-color: #667eea;
        }

        .upload-area {
            border: 3px dashed #ccc;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #fafafa;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .upload-area.dragover {
            border-color: #667eea;
            background: #e8eeff;
            transform: scale(1.02);
        }

        .upload-area.uploading {
            border-color: #3498db;
            background: #ebf5fb;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .upload-text {
            color: #666;
            font-size: 14px;
        }

        .upload-hint {
            color: #999;
            font-size: 12px;
            margin-top: 8px;
        }

        #fileInput {
            display: none;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e0e0e0;
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-success:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(17, 153, 142, 0.4);
        }

        /* 右侧内容区域 */
        .content-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .preview-panel {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .preview-container {
            min-height: 300px;
            background: #f5f5f5;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .preview-container img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
        }

        .preview-placeholder {
            color: #999;
            font-size: 16px;
        }

        .info-panel {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .info-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
        }

        .info-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
        }

        .status-processing {
            background: #cce5ff;
            color: #004085;
        }

        /* 日志面板 */
        .log-panel {
            background: #1e1e1e;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-height: 300px;
            overflow-y: auto;
        }

        .log-title {
            color: #fff;
            font-size: 14px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .log-content {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.6;
        }

        .log-entry {
            color: #d4d4d4;
            margin-bottom: 5px;
            padding: 3px 0;
            border-left: 3px solid transparent;
            padding-left: 10px;
        }

        .log-entry.info {
            border-left-color: #3498db;
        }

        .log-entry.success {
            border-left-color: #2ecc71;
            color: #2ecc71;
        }

        .log-entry.error {
            border-left-color: #e74c3c;
            color: #e74c3c;
        }

        .log-entry.warning {
            border-left-color: #f39c12;
            color: #f39c12;
        }

        .timestamp {
            color: #666;
            margin-right: 10px;
        }

        /* 巡检点位卡片 */
        .camera-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .camera-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .camera-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .camera-card.active {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .camera-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .camera-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .camera-type {
            font-size: 12px;
            color: #999;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }
        }

        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        /* 结果展示 */
        .result-panel {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            color: #666;
            font-size: 14px;
        }

        .result-value {
            font-weight: 600;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 智能巡检系统测试控制台</h1>
            <p>针对飞书多维表巡检点位进行照片上传和AI检测测试</p>
            <div class="connection-status" id="connectionStatus">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">正在连接后端服务...</span>
            </div>
        </div>

        <div class="main-grid">
            <!-- 左侧控制面板 -->
            <div class="control-panel">
                <div class="panel-title">📷 选择巡检点位</div>

                <!-- 巡检点位选择 -->
                <div class="form-group">
                    <label class="form-label">巡检点位 (Prompt)</label>
                    <select class="form-select" id="cameraSelect">
                        <option value="">请选择巡检点位...</option>
                    </select>
                </div>

                <!-- 检测类型 -->
                <div class="form-group">
                    <label class="form-label">检测类型</label>
                    <select class="form-select" id="detectType">
                        <option value="person">👤 人员检测</option>
                        <option value="vehicle">🚗 车辆检测</option>
                        <option value="all">🔍 全部检测</option>
                    </select>
                </div>

                <!-- 上传模式 -->
                <div class="form-group">
                    <label class="form-label">上传模式</label>
                    <select class="form-select" id="uploadMode">
                        <option value="aily">☁️ Aily技能触发</option>
                        <option value="bitable">📊 多维表格存储</option>
                    </select>
                </div>

                <!-- 文件上传区域 -->
                <div class="form-group">
                    <label class="form-label">上传照片</label>
                    <div class="upload-area" id="uploadArea">
                        <div class="upload-icon">📤</div>
                        <div class="upload-text">点击或拖拽上传照片</div>
                        <div class="upload-hint">支持 JPG、PNG、GIF 格式</div>
                    </div>
                    <input type="file" id="fileInput" accept="image/*">
                </div>

                <!-- 操作按钮 -->
                <button class="btn btn-primary" id="btnUpload">
                    🚀 开始上传检测
                </button>
                <button class="btn btn-secondary" id="btnClear">
                    🗑️ 清空选择
                </button>
                <button class="btn btn-success" id="btnBatch">
                    📁 批量测试（使用test_media目录）
                </button>

                <!-- 快捷巡检点位 -->
                <div class="panel-title" style="margin-top: 30px;">⚡ 快捷选择</div>
                <div class="camera-cards" id="cameraCards">
                    <!-- 动态生成 -->
                </div>
            </div>

            <!-- 右侧内容区域 -->
            <div class="content-area">
                <!-- 图片预览 -->
                <div class="preview-panel">
                    <div class="panel-title">🖼️ 图片预览</div>
                    <div class="preview-container" id="previewContainer">
                        <div class="preview-placeholder">
                            请选择图片进行预览
                        </div>
                    </div>
                </div>

                <!-- 信息面板 -->
                <div class="info-panel">
                    <div class="panel-title">📊 检测信息</div>
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">巡检点位</div>
                            <div class="info-value" id="infoCamera">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">检测状态</div>
                            <div class="info-value">
                                <span class="status-badge status-pending" id="infoStatus">等待上传</span>
                            </div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">检测目标数</div>
                            <div class="info-value" id="infoCount">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">上传时间</div>
                            <div class="info-value" id="infoTime">-</div>
                        </div>
                    </div>
                </div>

                <!-- 飞书上传结果 -->
                <div class="result-panel" id="resultPanel" style="display: none;">
                    <div class="panel-title">☁️ 飞书上传结果</div>
                    <div id="resultContent">
                        <!-- 动态生成 -->
                    </div>
                </div>

                <!-- 日志面板 -->
                <div class="log-panel">
                    <div class="log-title">
                        <span>📝 操作日志</span>
                        <button class="btn btn-secondary" style="width: auto; padding: 5px 10px; font-size: 12px;" onclick="clearLogs()">
                            清空日志
                        </button>
                    </div>
                    <div class="log-content" id="logContent">
                        <div class="log-entry info">
                            <span class="timestamp">[系统]</span>
                            测试控制台已就绪，请选择巡检点位并上传照片
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API基础URL
        const API_BASE_URL = 'http://localhost:5002';

        // 全局变量
        let selectedFile = null;
        let selectedCamera = null;
        let cameras = [];

        // DOM 元素
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const cameraSelect = document.getElementById('cameraSelect');
        const cameraCards = document.getElementById('cameraCards');
        const btnUpload = document.getElementById('btnUpload');
        const btnClear = document.getElementById('btnClear');
        const btnBatch = document.getElementById('btnBatch');
        const logContent = document.getElementById('logContent');
        const resultPanel = document.getElementById('resultPanel');
        const resultContent = document.getElementById('resultContent');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        // 添加日志
        function addLog(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerHTML = `<span class="timestamp">[${timestamp}]</span> ${message}`;
            logContent.appendChild(entry);
            logContent.scrollTop = logContent.scrollHeight;
        }

        // 清空日志
        function clearLogs() {
            logContent.innerHTML = `
                <div class="log-entry info">
                    <span class="timestamp">[系统]</span>
                    日志已清空
                </div>
            `;
        }

        // 更新连接状态
        function updateConnectionStatus(connected, message) {
            if (connected) {
                statusDot.classList.remove('error');
                statusText.textContent = message || '后端服务已连接';
            } else {
                statusDot.classList.add('error');
                statusText.textContent = message || '后端服务未连接';
            }
        }

        // 更新信息面板
        function updateInfo(camera, status, count, time) {
            document.getElementById('infoCamera').textContent = camera || '-';
            document.getElementById('infoCount').textContent = count || '-';
            document.getElementById('infoTime').textContent = time || '-';

            const statusBadge = document.getElementById('infoStatus');
            statusBadge.textContent = status || '等待上传';
            statusBadge.className = 'status-badge';

            switch(status) {
                case '上传成功':
                case '检测完成':
                    statusBadge.classList.add('status-success');
                    break;
                case '上传失败':
                case '检测失败':
                    statusBadge.classList.add('status-error');
                    break;
                case '处理中':
                    statusBadge.classList.add('status-processing');
                    break;
                default:
                    statusBadge.classList.add('status-pending');
            }
        }

        // 显示上传结果
        function showResult(data) {
            resultPanel.style.display = 'block';
            resultContent.innerHTML = `
                <div class="result-item">
                    <span class="result-label">上传模式</span>
                    <span class="result-value">${data.upload_mode === 'aily' ? 'Aily技能' : '多维表格'}</span>
                </div>
                <div class="result-item">
                    <span class="result-label">上传状态</span>
                    <span class="result-value" style="color: ${data.upload_result.success ? '#2ecc71' : '#e74c3c'}">
                        ${data.upload_result.success ? '✓ 成功' : '✗ 失败'}
                    </span>
                </div>
                ${data.upload_result.file_id ? `
                <div class="result-item">
                    <span class="result-label">Aily文件ID</span>
                    <span class="result-value">${data.upload_result.file_id}</span>
                </div>
                ` : ''}
                ${data.upload_result.file_token ? `
                <div class="result-item">
                    <span class="result-label">多维表格Token</span>
                    <span class="result-value">${data.upload_result.file_token}</span>
                </div>
                ` : ''}
                ${data.upload_result.message ? `
                <div class="result-item">
                    <span class="result-label">消息</span>
                    <span class="result-value">${data.upload_result.message}</span>
                </div>
                ` : ''}
                ${data.upload_result.error ? `
                <div class="result-item">
                    <span class="result-label">错误信息</span>
                    <span class="result-value" style="color: #e74c3c">${data.upload_result.error}</span>
                </div>
                ` : ''}
            `;
        }

        // 加载巡检点位列表
        async function loadCameras() {
            try {
                addLog('正在加载巡检点位列表...', 'info');
                const response = await fetch(`${API_BASE_URL}/api/cameras`);
                const result = await response.json();

                if (result.success) {
                    cameras = result.data;

                    // 更新下拉菜单
                    cameraSelect.innerHTML = '<option value="">请选择巡检点位...</option>';
                    cameras.forEach(cam => {
                        const option = document.createElement('option');
                        option.value = cam.id;
                        option.textContent = cam.name;
                        cameraSelect.appendChild(option);
                    });

                    // 更新快捷卡片
                    cameraCards.innerHTML = '';
                    cameras.slice(0, 3).forEach(cam => {
                        const card = document.createElement('div');
                        card.className = 'camera-card';
                        card.dataset.camera = cam.id;
                        card.innerHTML = `
                            <div class="camera-icon">${getCameraIcon(cam.id)}</div>
                            <div class="camera-name">${cam.name.split(' ')[1] || cam.name}</div>
                            <div class="camera-type">${cam.type === 'keyframe' ? '关键帧检测' : '定时截图'}</div>
                        `;
                        card.addEventListener('click', () => selectCamera(cam.id, card));
                        cameraCards.appendChild(card);
                    });

                    addLog(`已加载 ${cameras.length} 个巡检点位`, 'success');
                    updateConnectionStatus(true, '后端服务已连接');
                } else {
                    throw new Error(result.error || '加载失败');
                }
            } catch (error) {
                addLog(`加载巡检点位失败: ${error.message}`, 'error');
                updateConnectionStatus(false, '后端服务未连接');
            }
        }

        // 获取摄像头图标
        function getCameraIcon(cameraId) {
            const icons = {
                'cam_001': '🏭',
                'cam_002': '🚗',
                'cam_003': '📦',
                'cam_004': '🚪',
                'cam_005': '⚠️'
            };
            return icons[cameraId] || '📷';
        }

        // 选择巡检点位
        function selectCamera(cameraId, cardElement) {
            selectedCamera = cameraId;
            cameraSelect.value = cameraId;

            // 更新卡片状态
            document.querySelectorAll('.camera-card').forEach(c => c.classList.remove('active'));
            if (cardElement) {
                cardElement.classList.add('active');
            }

            const camera = cameras.find(c => c.id === cameraId);
            addLog(`已选择巡检点位: ${camera ? camera.name : cameraId}`, 'info');
        }

        // 文件上传处理
        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                addLog('请选择图片文件', 'error');
                return;
            }

            selectedFile = file;
            addLog(`已选择文件: ${file.name}`, 'info');

            // 预览图片
            const reader = new FileReader();
            reader.onload = (e) => {
                previewContainer.innerHTML = `<img src="${e.target.result}" alt="预览">`;
            };
            reader.readAsDataURL(file);
        }

        // 巡检点位选择事件
        cameraSelect.addEventListener('change', (e) => {
            if (e.target.value) {
                selectCamera(e.target.value);
            }
        });

        // 上传按钮
        btnUpload.addEventListener('click', async () => {
            if (!selectedCamera) {
                addLog('请先选择巡检点位', 'warning');
                return;
            }

            if (!selectedFile) {
                addLog('请先选择要上传的图片', 'warning');
                return;
            }

            const camera = cameras.find(c => c.id === selectedCamera);
            const detectType = document.getElementById('detectType').value;
            const uploadMode = document.getElementById('uploadMode').value;

            addLog(`开始上传...`, 'info');
            addLog(`巡检点位: ${camera ? camera.name : selectedCamera}`, 'info');
            addLog(`上传模式: ${uploadMode === 'aily' ? 'Aily技能' : '多维表格'}`, 'info');
            addLog(`检测类型: ${detectType}`, 'info');

            updateInfo(camera ? camera.name : selectedCamera, '处理中', '-', new Date().toLocaleTimeString());

            // 显示上传状态
            btnUpload.disabled = true;
            btnUpload.innerHTML = '<span class="loading"></span> 上传中...';
            uploadArea.classList.add('uploading');

            try {
                // 创建FormData
                const formData = new FormData();
                formData.append('camera_id', selectedCamera);
                formData.append('detect_type', detectType);
                formData.append('upload_mode', uploadMode);
                formData.append('image', selectedFile);

                // 发送请求
                const response = await fetch(`${API_BASE_URL}/api/upload`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    addLog('图片上传成功', 'success');
                    addLog(`YOLO检测完成: 发现 ${result.data.detection_count} 个目标`, 'success');

                    if (result.data.upload_result.success) {
                        addLog('飞书上传成功', 'success');
                        if (uploadMode === 'aily') {
                            addLog(`Aily技能已触发`, 'success');
                        } else {
                            addLog(`已上传到多维表格`, 'success');
                        }
                        updateInfo(
                            result.data.camera_name,
                            '检测完成',
                            result.data.detection_count,
                            new Date(result.data.timestamp).toLocaleTimeString()
                        );
                        showResult(result.data);
                    } else {
                        addLog(`飞书上传失败: ${result.data.upload_result.error}`, 'error');
                        updateInfo(result.data.camera_name, '上传失败', result.data.detection_count, '-');
                    }
                } else {
                    throw new Error(result.error || '上传失败');
                }
            } catch (error) {
                addLog(`上传失败: ${error.message}`, 'error');
                updateInfo(null, '上传失败', '-', '-');
            } finally {
                btnUpload.disabled = false;
                btnUpload.innerHTML = '🚀 开始上传检测';
                uploadArea.classList.remove('uploading');
            }
        });

        // 清空按钮
        btnClear.addEventListener('click', () => {
            selectedFile = null;
            selectedCamera = null;
            cameraSelect.value = '';
            fileInput.value = '';
            previewContainer.innerHTML = '<div class="preview-placeholder">请选择图片进行预览</div>';
            document.querySelectorAll('.camera-card').forEach(c => c.classList.remove('active'));
            resultPanel.style.display = 'none';
            updateInfo(null, null, null, null);
            addLog('已清空所有选择', 'info');
        });

        // 批量测试按钮
        btnBatch.addEventListener('click', async () => {
            if (!selectedCamera) {
                addLog('请先选择巡检点位', 'warning');
                return;
            }

            const camera = cameras.find(c => c.id === selectedCamera);
            const uploadMode = document.getElementById('uploadMode').value;

            addLog('开始批量测试...', 'info');
            addLog(`使用巡检点位: ${camera ? camera.name : selectedCamera}`, 'info');

            btnBatch.disabled = true;
            btnBatch.innerHTML = '<span class="loading"></span> 批量测试中...';

            try {
                const response = await fetch(`${API_BASE_URL}/api/batch_upload`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        camera_id: selectedCamera,
                        upload_mode: uploadMode
                    })
                });

                const result = await response.json();

                if (result.success) {
                    addLog(`批量测试完成`, 'success');
                    addLog(`共处理 ${result.data.processed} 张图片`, 'info');

                    result.data.results.forEach((r, i) => {
                        if (r.error) {
                            addLog(`  ${i+1}. ${r.file}: 失败 - ${r.error}`, 'error');
                        } else {
                            addLog(`  ${i+1}. ${r.file}: 成功 (${r.detection_count}个目标)`, 'success');
                        }
                    });
                } else {
                    throw new Error(result.error || '批量测试失败');
                }
            } catch (error) {
                addLog(`批量测试失败: ${error.message}`, 'error');
            } finally {
                btnBatch.disabled = false;
                btnBatch.innerHTML = '📁 批量测试（使用test_media目录）';
            }
        });

        // 页面加载完成
        addLog('测试控制台已加载完成', 'info');
        addLog('正在连接后端服务...', 'info');

        // 加载巡检点位
        loadCameras();

        // 定时检查后端状态
        setInterval(async () => {
            try {
                const response = await fetch(`${API_BASE_URL}/api/health`, { timeout: 5000 });
                if (response.ok) {
                    updateConnectionStatus(true, '后端服务已连接');
                }
            } catch (error) {
                updateConnectionStatus(false, '后端服务未连接');
            }
        }, 30000);
    </script>
</body>
</html>
